<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | To-Do App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>TaskFlow</h1>
            <p>Stay organized and finish your tasks.</p>
        </header>

        <!-- Stats -->
        <div class="stats">

            <div class="card">
                <i class="fa-solid fa-list-check"></i>
                <h2 id="totalTasks">0</h2>
                <span>Total</span>
            </div>

            <div class="card">
                <i class="fa-solid fa-circle-check"></i>
                <h2 id="completedTasks">0</h2>
                <span>Completed</span>
            </div>

            <div class="card">
                <i class="fa-solid fa-hourglass-half"></i>
                <h2 id="pendingTasks">0</h2>
                <span>Pending</span>
            </div>

        </div>

        <!-- Search -->
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
                type="text"
                id="searchInput"
                placeholder="Search tasks..."
            >
        </div>

        <!-- Add Task -->
        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addBtn">
                <i class="fa-solid fa-plus"></i>
                Add
            </button>

        </div>

        <!-- Filter -->
        <div class="filter">

            <button class="filter-btn active" data-filter="all">
                All
            </button>

            <button class="filter-btn" data-filter="pending">
                Pending
            </button>

            <button class="filter-btn" data-filter="completed">
                Completed
            </button>

        </div>

        <!-- Task List -->
        <ul id="taskList">

            <!-- JavaScript will create tasks here -->

        </ul>

        <!-- Empty Message -->
        <div class="empty" id="emptyState">

            <i class="fa-solid fa-clipboard-list"></i>

            <h2>No Tasks Yet</h2>

            <p>Add your first task and boost your productivity.</p>

        </div>

    </div>

    <!-- Footer -->
    <footer>

        Made with ❤️ using HTML, CSS & JavaScript

    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
